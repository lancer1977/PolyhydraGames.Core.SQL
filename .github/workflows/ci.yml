name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run deterministic smoke
        run: ./scripts/sql-smoke.sh

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: core-sql-nuget
          path: artifacts/sql-smoke/packages/*
          if-no-files-found: error

      - name: Publish tagged package to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        run: dotnet nuget push "artifacts/sql-smoke/packages/*.nupkg" --source "https://nuget.pkg.github.com/lancer1977/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
